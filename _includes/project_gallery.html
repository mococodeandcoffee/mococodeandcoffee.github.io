<div class="project-gallery">
  {% for project in site.data.projects %}
  <div class="project-card">
    {% if project.image and project.image != "" %}
    <div class="project-card-image">
      <img src="{{ project.image }}" alt="{{ project.name | escape }}">
    </div>
    {% else %}
    <div class="project-card-image project-card-image--placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    {% endif %}
    <div class="project-card-body">
      <h3 class="project-card-name">{{ project.name | escape }}</h3>
      <p class="project-card-author">by {{ project.author | escape }}</p>
      <p class="project-card-description">{{ project.description | escape }}</p>
      {% if project.link and project.link != "" %}
      <a href="{{ project.link }}" target="_blank" rel="noopener" class="project-card-link btn-tan">View Project</a>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
