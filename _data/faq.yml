- question: Where do meetups take place?
  answer: >
    We meet in various locations around Montgomery County. We prioritize locations that are accessible
    by public transportation. The specific location is posted on each event page
    [on Meetup](https://www.meetup.com/mocode-coffee/){:target="_blank" rel="noopener"}. RSVP there to get the latest details.

- question: How much does it cost to attend?
  answer: >
    Attending is completely free! 
    We believe in keeping the community accessible to everyone.

- question: Do I need to RSVP?
  answer: >
    RSVPs help us plan seating and notify the venue, so we encourage it. Walk-ins are always welcome too.
    RSVP on our [Meetup page](https://www.meetup.com/mocode-coffee/){:target="_blank" rel="noopener"}.

- question: What should I bring?
  answer: >
    Bring whatever you need to work or learn: a laptop, a notebook, a side project, or just curiosity.
    Power outlets are usually available but limited, so a charged battery helps.

- question: I'm a beginner. Is this for me?
  answer: >
    Absolutely. MoCo Code & Coffee is explicitly inclusive of beginners. There are always friendly folks
    happy to help or just sit alongside you while you learn.

- question: Can I bring a friend who isn't a developer?
  answer: >
    Of course! Designers, product folks, entrepreneurs, and curious non-engineers are all welcome.
    If they're interested in tech, they'll fit right in.
